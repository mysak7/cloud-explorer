services:
  netbird:
    image: netbirdio/netbird:latest
    privileged: true
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
    environment:
      NB_SETUP_KEY: ${NB_SETUP_KEY}
    volumes:
      - netbird-client:/etc/netbird
    restart: unless-stopped
    ports:
      - "3000:3000"

  pgvector:
    image: pgvector/pgvector:pg17
    container_name: agent-memory
    environment:
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent_password
      POSTGRES_DB: agent_memory
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./memory/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    restart: unless-stopped

  gcp-token-refresh:
    image: google/cloud-sdk:alpine
    volumes:
      - ${HOME}/.config/gcloud:/root/.config/gcloud:ro
      - gcp-token:/tmp/gcp
    command: >
      sh -c "while true; do
        gcloud auth application-default print-access-token > /tmp/gcp/token 2>/dev/null || echo '' > /tmp/gcp/token;
        sleep 2700;
      done"
    restart: unless-stopped

  agent:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        USER_UID: ${HOST_UID:-1000}
        USER_GID: ${HOST_GID:-1000}
    network_mode: "service:netbird"
    volumes:
      - .:/workspace:cached
      - ${HOME}/.aws/credentials:/home/agent/.aws/credentials:ro
      - ${HOME}/.aws/config:/home/agent/.aws/config:ro
      - ${HOME}/.claude.json:/home/agent/.claude.json
      - ${HOME}/.claude/.credentials.json:/home/agent/.claude/.credentials.json:ro
      - ${HOME}/.config/gcloud:/home/agent/.config/gcloud:ro
      - gcp-token:/tmp/gcp:ro
    environment:
      AWS_PROFILE: ${AWS_PROFILE:-default}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GCP_PROJECT_ID: ${GCP_PROJECT_ID:-}
      GCP_ACCESS_TOKEN_FILE: /tmp/gcp/token
    depends_on:
      - netbird
      - pgvector
      - gcp-token-refresh
    restart: unless-stopped
    stdin_open: true
    tty: true

volumes:
  netbird-client:
  pgdata:
  gcp-token:
